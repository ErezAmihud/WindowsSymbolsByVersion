# Repo-wide tool config. This is NOT a package (cli/ has its own pyproject.toml
# for that); it only holds linter/formatter/type-checker settings for code/,
# tests/ and cli/.

[tool.ruff]
target-version = "py39"
line-length = 88  # black default
extend-exclude = ["manifests", "graphify-out", ".tokensave", "builds_state.json"]

[tool.ruff.lint]
# A pragmatic default set: pyflakes/pycodestyle, imports, bugbears, pyupgrade,
# comprehensions, simplify. Formatting rules are left to black.
select = ["E", "F", "W", "I", "B", "C4", "UP", "SIM"]

[tool.black]
target-version = ["py39"]
line-length = 88
extend-exclude = "manifests|graphify-out|.tokensave"

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true  # requests/pefile/etc. ship no stubs here
exclude = "manifests|graphify-out|.tokensave"

[tool.pyrefly]
project-includes = ["code", "tests", "cli/src"]
project-excludes = ["manifests", "graphify-out", ".tokensave"]
