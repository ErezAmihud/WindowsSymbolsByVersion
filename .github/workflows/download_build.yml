name: Download uuid build
on:
  workflow_call:
    inputs:
      uuid:
        description: 'UUP entry uuid'
        default: 'c598cdd6-8d6a-4fa1-8161-8e96e362b127'
        required: false
        type: string

jobs:
  create_iso:
    name: create iso
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.10'
        - run: python -m pip install -r requirements.txt
        - id: get_editions
          shell: cmd
          run: python .\code\get_editions.py ${{inputs.uuid}}
        - name: Download Commands
          run: |
            curl "https://uupdump.net/get.php?id=${{inputs.uuid}}&pack=en-us&edition=${{ steps.get_editions.outputs.editions }}" -X POST -H "Content-Type: application/x-www-form-urlencoded" -d "autodl=2&updates=1" -o download_commands.zip
        - name: unzip download_commands.zip
          run: Expand-Archive download_commands.zip -DestinationPath .
        - name: Set config
          run: copy config.template ConvertConfig.ini
          shell: cmd
        - name: Change blocking commands to non blocking
          run: (gc uup_download_windows.cmd) -replace 'pause', 'exit 1' | Out-File -encoding ASCII uup_download_windows.cmd
          shell: powershell
        - name: Create iso
          uses: nick-fields/retry@v3
          with:
            max_attempts: 3
            timeout_minutes: 110
            retry_wait_seconds: 100
            retry_on: error
            shell: cmd
            command: cmd /c .\uup_download_windows.cmd
        - name: Rename result
          shell: cmd
          run: .\code\move_iso_dir.bat
        - name: Parse iso root
          run: python ./code/pdb_finding.py unpacked_dir manifest_general.out manifest_general.paths
        - uses: actions/upload-artifact@v4
          with:
            name: ${{inputs.uuid}}manifest_general.out
            path: |
              manifest_general.out
              manifest_general.paths
            retention-days: 1
        - uses: actions/upload-artifact@v4
          with:
            name: ${{inputs.uuid}}install.wim
            path: unpacked_dir/sources/install.wim
            retention-days: 1
        - uses: actions/upload-artifact@v4
          with:
            name: ${{inputs.uuid}}boot.wim
            path: unpacked_dir/sources/boot.wim
            retention-days: 1

  mark_build_failed:
    runs-on: ubuntu-latest
    needs: create_iso
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    permissions:
      contents: write
    steps:
      - name: Mutex Action
        uses: ben-z/gh-action-mutex@v1.0.0-alpha.9
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - run: python3 code/state.py mark-failed '${{ inputs.uuid }}' --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
      - uses: EndBug/add-and-commit@v9
        with:
          add: "builds_state.json"
          message: 'Automated commit, record failed attempt for ${{inputs.uuid}}'

  split_wims:
    runs-on: ubuntu-latest
    needs: create_iso
    permissions:
      contents: read
    outputs:
      split_boot: ${{ steps.split_boot.outputs.version_matrix }}
      split_install: ${{ steps.split_install.outputs.version_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Installations
        run: sudo apt-get update && xargs sudo apt-get install --no-install-recommends -y < packages.txt && python3 -m pip install -r requirements.txt && chmod +x ./code/*
      - name: Download boot wim
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}boot.wim

      - name: Download install wim
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}install.wim

      - name: Find boot files to parse
        id: split_boot
        run: python3 ./code/wim_dedup.py boot.wim boot >> "$GITHUB_OUTPUT"
      - name: Find install files to parse
        id: split_install
        run: python3 ./code/wim_dedup.py install.wim install >> "$GITHUB_OUTPUT"
      - name: Upload listfiles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.uuid }}listfiles
          path: listfile_*.txt
          retention-days: 1
      - name: clean
        run: rm -rf ./install.wim ./boot.wim

  parse_boot_wim:
    needs: split_wims
    name: parse boot wim
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        version: ${{ fromJson(needs.split_wims.outputs.split_boot) }}

    steps:
      - uses: actions/checkout@v4
      - name: Installations
        run: sudo apt-get update && xargs sudo apt-get install --no-install-recommends -y < packages.txt && python3 -m pip install -r requirements.txt && chmod +x ./code/*
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}boot.wim
      - name: Download listfiles
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}listfiles
      - name: Generate boot wim manifest
        run: bash ./code/extract_and_parse.sh boot ${{ matrix.version }}
      - name: Archive manifest result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.uuid }}manifest_boot_${{ matrix.version }}
          path: |
            manifest_boot_${{ matrix.version }}.out
            manifest_boot_${{ matrix.version }}.paths

  parse_install_wim:
    needs: split_wims
    name: parse install wim
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        version: ${{ fromJson(needs.split_wims.outputs.split_install) }}

    steps:
      - uses: actions/checkout@v4
      - name: Installations
        run: sudo apt-get update && xargs sudo apt-get install --no-install-recommends -y < packages.txt && python3 -m pip install -r requirements.txt && chmod +x ./code/*
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}install.wim
      - name: Download listfiles
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}listfiles
      - name: Generate install wim manifest
        run: bash ./code/extract_and_parse.sh install ${{ matrix.version }}
      - name: Archive manifest result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.uuid }}manifest_install_${{ matrix.version }}
          path: |
            manifest_install_${{ matrix.version }}.out
            manifest_install_${{ matrix.version }}.paths


  merge_artifacts:
    needs:
      - parse_boot_wim
      - parse_install_wim
      - create_iso
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: partials
        pattern: ${{ inputs.uuid }}manifest*
        merge-multiple: true
    - run: bash ./code/merge_manifests.sh
    - run: python3 code/merge_paths.py ./partials files.json

    - name: Archive manifest result
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.uuid }}merged_manifest
        path: |
          manifest.out
          files.json

  deploy_manifest:
    needs: merge_artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mutex Action
        uses: ben-z/gh-action-mutex@v1.0.0-alpha.9
      - name: Force LF line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - run: python3 -m pip install -r requirements.txt
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}merged_manifest
      - run: mv manifest.out manifests/${{ inputs.uuid }}.manifest
      - name: Deploy files.json
        # an empty list means the paths pipeline produced nothing - do not
        # commit it, the CLI treats a missing files.json as "no path data"
        run: if [ -s files.json ] && [ "$(cat files.json)" != "[]" ]; then mv files.json manifests/${{ inputs.uuid }}.files.json; fi
      - name: Mark build done
        run: python3 code/state.py mark-done '${{ inputs.uuid }}'
      - uses: EndBug/add-and-commit@v9
        with:
          add: '["manifests", "builds_state.json"]'
          message: 'Automated commit, add manifest for ${{inputs.uuid}}'
