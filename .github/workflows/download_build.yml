name: Download uuid build
on:
  workflow_call:
    inputs:
      uuid:
        description: 'UUP entry uuid'
        default: 'c598cdd6-8d6a-4fa1-8161-8e96e362b127'
        required: false
        type: string

jobs:
  create-iso-and-parse:
    name: Create ISO and parse PDBs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Get editions
        id: get_editions
        run: python -m src.get_editions ${{ inputs.uuid }}

      - name: Download UUPDump build script
        run: |
          curl "https://uupdump.net/get.php?id=${{ inputs.uuid }}&pack=en-us&edition=${{ steps.get_editions.outputs.editions }}" `
            -X POST -H "Content-Type: application/x-www-form-urlencoded" `
            -d "autodl=2&updates=1" -o download_commands.zip

      - name: Unzip download script
        run: Expand-Archive download_commands.zip -DestinationPath .

      - name: Set config
        shell: cmd
        run: copy config.template ConvertConfig.ini

      - name: Patch download script (remove blocking pauses)
        shell: powershell
        run: (gc uup_download_windows.cmd) -replace 'pause', 'exit 1' | Out-File -encoding ASCII uup_download_windows.cmd

      - name: Create ISO
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 10000
          retry_wait_seconds: 100
          retry_on: error
          shell: cmd
          command: cmd /c .\uup_download_windows.cmd

      - name: Find and move unpacked dir
        run: python -m src.find_unpacked_dir

      - name: Parse boot.wim (PE files only via 7-Zip)
        run: python -m src.parse_wim unpacked_dir/sources/boot.wim manifest_boot.out

      - name: Parse install.wim (PE files only via 7-Zip)
        run: python -m src.parse_wim unpacked_dir/sources/install.wim manifest_install.out

      - name: Merge and deduplicate manifests
        run: python -m src.merge_manifests manifest_boot.out manifest_install.out -o manifest.out

      - name: Upload final manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.uuid }}merged_manifest
          path: manifest.out
          retention-days: 1

      - name: Clean up unpacked dir to free space
        if: always()
        shell: cmd
        run: if exist unpacked_dir rmdir /s /q unpacked_dir

  failed-create-iso:
    runs-on: ubuntu-latest
    needs: create-iso-and-parse
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:
      - name: Mutex Action
        uses: ben-z/gh-action-mutex@v1.0.0-alpha.9
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - run: python3 -m src.mark_problematic ${{ inputs.uuid }}
      - uses: EndBug/add-and-commit@v9
        with:
          add: "problematic.json"
          message: 'Automated commit, add a problematic uuid - ${{ inputs.uuid }}'

  deploy_manifest:
    needs: create-iso-and-parse
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Mutex Action
        uses: ben-z/gh-action-mutex@v1.0.0-alpha.9
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Download merged manifest
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.uuid }}merged_manifest
      - run: mv manifest.out manifests/${{ inputs.uuid }}.manifest
      - name: Get build name
        id: get_name
        run: python3 -m src.get_build_name ${{ inputs.uuid }}
      - name: Mark UUID as processed
        run: python3 -m src.mark_processed ${{ inputs.uuid }}
      - name: Update docs index
        run: python3 -m src.update_docs "${{ steps.get_name.outputs.name }}" ${{ inputs.uuid }}
      - uses: EndBug/add-and-commit@v9
        with:
          add: '["manifests", "docs", "process_builds.json"]'
          message: 'Automated commit, add manifest for ${{ inputs.uuid }}'
