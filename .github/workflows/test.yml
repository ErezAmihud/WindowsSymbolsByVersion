name: Tests
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installations
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y wimtools && pip install -r requirements.txt
      - run: python3 tests/test_daily.py
      - run: python3 tests/test_state.py
      - run: python3 tests/test_pdb_finding.py
      - run: python3 tests/test_wim_dedup.py
      - run: pip install -e ./cli
      - run: python3 tests/test_cli.py
      - name: Docs build
        run: mkdocs build --strict

  # Exercises the full download_build.yml pipeline with synthetic WIMs, skipping the
  # ~110min Windows create_iso build. test_mode guards off every commit, but the reusable
  # workflow's deploy/mark-failed jobs still declare contents: write, so the caller must
  # grant it here or the run fails at startup.
  pipeline_test:
    permissions:
      contents: write
    uses: ./.github/workflows/download_build.yml
    with:
      test_mode: true
