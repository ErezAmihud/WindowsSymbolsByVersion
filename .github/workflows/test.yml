name: Tests
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Installations
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y wimtools && pip install -r requirements.txt pytest
      - run: pip install -e ./cli
      - run: pytest tests/
      - name: Docs build
        run: mkdocs build --strict

  # Exercises the full download_build.yml pipeline with synthetic WIMs, skipping the
  # ~110min Windows create_iso build. test_mode guards off every commit, but the reusable
  # workflow's deploy/mark-failed jobs still declare contents: write, so the caller must
  # grant it here or the run fails at startup.
  pipeline_test:
    permissions:
      contents: write
    uses: ./.github/workflows/download_build.yml
    with:
      test_mode: true
