name: Release CLI to PyPI
# Publishes cli/ as the `winsyms` package. Trigger by pushing a cli-v* tag
# (e.g. cli-v0.1.0). Uses PyPI trusted publishing: the winsyms project on
# PyPI must have this repo + workflow configured as a trusted publisher.
on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install -e ./cli pytest
      - run: pytest tests/test_cli.py

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build cli/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist
