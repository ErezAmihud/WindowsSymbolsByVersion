# Enforced locally (`pre-commit install`) and in CI (.github/workflows/lint.yml).
# Generated data dirs are excluded globally so hooks only see real source.
exclude: '^(manifests/|graphify-out/|\.tokensave/|builds_state\.json$)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Python: lint (ruff) + format (black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  # Python: type checking
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 1.1.1
    hooks:
      - id: pyrefly-check

  # Shell: lint (shellcheck) + format (shfmt)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.1
    hooks:
      - id: markdownlint

  # GitHub Actions workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
